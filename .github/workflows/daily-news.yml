name: Daily news signal

# 매일 07:00 KST(=22:00 UTC) 자동: 뉴스 수집 → 감성 지수 → 당일(offset=0) 신호 → deploy 커밋.
# 시장은 미국 기준 — 07:00 KST면 전날 미국장 마감(한국 새벽) 직후라 '간밤 신호'가 신선하게 확정됨.
# ※ cron 은 이 파일이 기본 브랜치(main)에 있어야 작동. 작업 대상은 deploy 브랜치.
on:
  workflow_dispatch:              # 수동 실행 버튼 (Actions 탭)
  schedule:
    - cron: '0 22 * * *'          # 22:00 UTC = 07:00 KST (미국 마감 후, 한국 아침)

permissions:
  contents: write                 # 갱신 데이터 커밋·푸시용

concurrency:
  group: daily-news
  cancel-in-progress: false

jobs:
  news:
    runs-on: ubuntu-latest
    env:
      SENTIMENT_ENGINE: finbert
      FINBERT_MODEL_DIR: models/finbert-finetuned
      NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
    steps:
      - name: Checkout deploy branch
        uses: actions/checkout@v4
        with:
          ref: deploy/streamlit-dashboard

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache FinBERT model
        id: cache-model
        uses: actions/cache@v4
        with:
          path: models/finbert-finetuned
          key: finbert-model-v1

      - name: Download & unpack FinBERT model (캐시 미스 시에만)
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: |
          curl -L -o model.zip "${{ secrets.MODEL_URL }}"
          mkdir -p _m
          unzip -q -o model.zip -d _m || echo "unzip 경고 무시(exit $?) — config.json 존재로 검증"
          cfg="$(find _m -name config.json | head -1)"
          test -n "$cfg" || { echo "config.json 없음 — 모델 zip 확인"; exit 1; }
          rm -rf models/finbert-finetuned && mkdir -p models && mv "$(dirname "$cfg")" models/finbert-finetuned
          rm -rf _m model.zip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install transformers requests beautifulsoup4 pandas numpy yfinance

      - name: Run daily news pipeline (수집 → 지수 → 당일 신호)
        continue-on-error: true       # 일시적 API/네트워크 실패로 잡 전체가 죽지 않게
        run: sh scripts/run_news_daily.sh

      - name: Commit refreshed daily outputs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f outputs/news_index_live.csv outputs/daily_headline.csv outputs/news_signals.csv data/news/fed_news.csv 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "변경 없음 — 새 뉴스/신호 없음. 커밋 생략."
          else
            git commit -m "chore: daily news signal refresh [skip ci]"
            git push origin HEAD:deploy/streamlit-dashboard
          fi
