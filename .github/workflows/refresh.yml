name: Refresh FOMC data & redeploy

# 새 FOMC 데이터를 클라우드에서 자동 갱신 → deploy 브랜치에 커밋 → Streamlit Cloud 자동 재배포.
# ※ 예약(cron)은 이 파일이 기본 브랜치(main)에 있어야 작동한다. 작업 대상은 deploy 브랜치.
on:
  workflow_dispatch:            # 수동 실행 버튼 (Actions 탭)
  schedule:
    - cron: '0 8 * * 4'         # 매주 목요일 08:00 UTC (FOMC 성명문은 수요일 오후 ET 발표)

permissions:
  contents: write               # 갱신 데이터 커밋·푸시용 (기본 GITHUB_TOKEN)

concurrency:                    # 동시 실행 방지
  group: fomc-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout deploy branch
        uses: actions/checkout@v4
        with:
          ref: deploy/streamlit-dashboard

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache FinBERT model (419MB — 최초 1회만 다운로드)
        id: cache-model
        uses: actions/cache@v4
        with:
          path: models/finbert-finetuned
          key: finbert-model-v1

      - name: Download & unpack FinBERT model (캐시 미스 시에만)
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: |
          curl -L -o model.zip "${{ secrets.MODEL_URL }}"
          mkdir -p _model_tmp
          # Dropbox 폴더 zip 은 절대경로(/) 엔트리 탓에 unzip 이 경고로 비정상 종료할 수 있다.
          # 경고(exit 1/2)는 무시하고, 실제 성공 여부는 아래 config.json 존재로 판정한다.
          unzip -q -o model.zip -d _model_tmp || echo "unzip 경고 무시(exit $?) — config.json 존재로 검증"
          # zip 내부 구조(평탄/중첩) 무관하게 config.json 위치를 찾아 정규화
          cfg="$(find _model_tmp -name config.json | head -1)"
          test -n "$cfg" || { echo "config.json 없음 — 모델 zip 확인 필요"; exit 1; }
          rm -rf models/finbert-finetuned
          mkdir -p models
          mv "$(dirname "$cfg")" models/finbert-finetuned
          rm -rf _model_tmp model.zip
          ls -la models/finbert-finetuned

      - name: Install pipeline dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install transformers requests beautifulsoup4 pandas numpy yfinance

      - name: Scrape latest FOMC statements (증분 — 이미 받은 회의는 건너뜀)
        run: python engine/scrape.py 5

      - name: Score statements with FinBERT
        env:
          SENTIMENT_ENGINE: finbert
          FINBERT_MODEL_DIR: models/finbert-finetuned
        run: python pipeline.py

      - name: Collect market & FRED yields
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python analysis/collect_market.py

      - name: Refresh news (best-effort — 실패해도 전체 잡은 계속)
        continue-on-error: true
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: |
          python engine/news_scrape.py
          python analysis/news_index_live.py

      - name: Commit & push refreshed data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f data/fomc.db outputs/news_index_live.csv data/news/fed_news.csv 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "변경 없음 — 새 FOMC/데이터 없음. 커밋 생략."
          else
            git commit -m "chore: auto-refresh FOMC data [skip ci]"
            git push origin HEAD:deploy/streamlit-dashboard
          fi
